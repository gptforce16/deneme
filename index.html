<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profesyonel Kuyu Sondaj Logu ve Teçhiz Editörü</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Leaflet Map CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        #map {
            z-index: 10;
        }
        
        /* A4 Çıktı ve Ekranda Gizleme Kuralları */
        #print-area {
            display: none;
        }

        /* --- KUSURSUZ YAZDIRMA & PDF ÇIKTISI İÇİN CSS --- */
        @media print {
            @page {
                size: A4 portrait;
                margin: 0mm;
            }
            body {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                background-color: white !important;
                margin: 0;
                padding: 0;
            }
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            header, main, #toast {
                display: none !important;
            }
            #print-area {
                display: flex !important;
                position: absolute;
                left: 0;
                top: 0;
                width: 210mm;
                height: 297mm;
                margin: 0;
                padding: 10mm;
                box-sizing: border-box;
                page-break-after: avoid;
                page-break-before: avoid;
                background: #ffffff;
                color: #1e293b;
            }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <!-- Header -->
    <header class="bg-gradient-to-r from-slate-900 to-slate-800 text-white shadow-md py-4 px-6 mb-6">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2.5 rounded-lg shadow-inner text-white">
                    <i class="fa-solid fa-mountain-sun text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-xl md:text-2xl font-bold tracking-tight">GeoLog Pro</h1>
                    <p class="text-xs text-blue-300">Kuyu Logu Editörü</p>
                </div>
            </div>
            <div class="flex flex-wrap gap-2">
                <button onclick="loadSampleData()" class="bg-blue-600 hover:bg-blue-500 text-white px-3.5 py-2 rounded-lg font-semibold text-xs transition flex items-center gap-1.5 shadow">
                    <i class="fa-solid fa-database"></i> Hazır Şablon Yükle
                </button>
                <button onclick="clearAllData()" class="bg-rose-600 hover:bg-rose-500 text-white px-3.5 py-2 rounded-lg font-semibold text-xs transition flex items-center gap-1.5 shadow">
                    <i class="fa-solid fa-eraser"></i> Sayfayı Sıfırla
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 pb-16">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <!-- Sol Panel (Giriş Formları) -->
            <div class="lg:col-span-8 flex flex-col gap-6">
                
                <!-- Firma ve Lokasyon Kartı -->
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                    <div class="flex items-center gap-2 border-b border-slate-100 pb-3 mb-4">
                        <i class="fa-solid fa-building text-blue-600 text-lg"></i>
                        <h2 class="text-base font-bold text-slate-800">Kuyu Künyesi</h2>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                        <div class="md:col-span-2">
                            <label class="block text-xs font-bold text-slate-500 mb-1">FİRMA ADI</label>
                            <input type="text" id="firm_name" value="Yeryüzü Jeoteknik, Sondaj ve Müşavirlik Ltd. Şti." class="w-full bg-slate-50 border border-slate-300 rounded-lg px-3 py-1.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">SORUMLU MÜHENDİS</label>
                            <input type="text" id="firm_engineer" value="Ahmet Yılmaz (Jeoloji Mühendisi)" class="w-full bg-slate-50 border border-slate-300 rounded-lg px-3 py-1.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">KUYU SAHİBİ</label>
                            <input type="text" id="p_client" value="Doğa Tarım ve Hayvancılık A.Ş." class="w-full bg-slate-50 border border-slate-300 rounded-lg px-3 py-1.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">İL</label>
                            <input type="text" id="p_il" value="Bursa" class="w-full bg-slate-50 border border-slate-300 rounded-lg px-3 py-1.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">İLÇE</label>
                            <input type="text" id="p_ilce" value="Yenişehir" class="w-full bg-slate-50 border border-slate-300 rounded-lg px-3 py-1.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">MAHALLE</label>
                            <input type="text" id="p_mahalle" value="Çeltikçi" class="w-full bg-slate-50 border border-slate-300 rounded-lg px-3 py-1.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-12 gap-4">
                        <div class="md:col-span-2">
                            <label class="block text-xs font-bold text-slate-500 mb-1">ADA</label>
                            <input type="text" id="p_ada" value="104" class="w-full bg-slate-50 border border-slate-300 rounded-lg px-3 py-1.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-xs font-bold text-slate-500 mb-1">PARSEL</label>
                            <input type="text" id="p_parsel" value="12" class="w-full bg-slate-50 border border-slate-300 rounded-lg px-3 py-1.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div class="md:col-span-3">
                            <label class="block text-xs font-bold text-slate-500 mb-1">TARİHİ</label>
                            <input type="date" id="p_tarih" class="w-full bg-slate-50 border border-slate-300 rounded-lg px-3 py-1.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-xs font-bold text-slate-500 mb-1">DERİNLİK (m)</label>
                            <input type="number" id="p_derinlik" value="100" oninput="drawCanvasLog()" class="w-full bg-slate-50 border border-slate-300 rounded-lg px-3 py-1.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div class="md:col-span-3">
                            <label class="block text-xs font-bold text-slate-500 mb-1">KUYU AMACI</label>
                            <input type="text" id="p_amaci" value="Endüstriyel & Sulama Suyu" class="w-full bg-slate-50 border border-slate-300 rounded-lg px-3 py-1.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">UTM DİLİMİ (ZONE)</label>
                            <input type="number" id="p_zone" value="35" oninput="updateMapFromUtm()" class="w-full bg-slate-50 border border-slate-300 rounded-lg px-3 py-1.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">SAĞA DEĞER (DOĞU / Y)</label>
                            <input type="number" id="p_easting" value="641250" oninput="updateMapFromUtm()" class="w-full bg-slate-50 border border-slate-300 rounded-lg px-3 py-1.5 text-
